name: Claude Code

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened]

jobs:
  claude:
    uses: synadia-io/ai-workflows/.github/workflows/claude.yml@v1
    with:
      review_focus: |
        Additionally focus on:
        - Memory safety (buffer overflows, use-after-free, double-free, null dereferences)
        - Resource leaks (malloc/free pairing, file descriptors, mutex lifecycle)
        - Thread safety and correct locking patterns
        - Cross-platform compatibility (Windows, macOS, Linux)
    secrets:
      claude_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
